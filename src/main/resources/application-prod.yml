spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-init-sql: SET TIME ZONE '${SAYNOW_TIME_ZONE:Asia/Seoul}'
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: ${SAYNOW_TIME_ZONE:Asia/Seoul}
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

saynow:
  ai:
    client-mode: ${SAYNOW_AI_CLIENT_MODE:remote}
    service-audience: AMERICAN_LEARNER

sentry:
  enabled: ${SENTRY_ENABLED:true}
  environment: ${SENTRY_ENVIRONMENT:prod}
  release: ${SENTRY_RELEASE:saynow-be}
  send-default-pii: false
  max-request-body-size: NONE
  traces-sample-rate: 0.0
  logs:
    enabled: ${SENTRY_LOGS_ENABLED:true}
  logging:
    enabled: false
