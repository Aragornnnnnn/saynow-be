spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

saynow:
  openapi:
    server-url: ${SAYNOW_OPENAPI_SERVER_URL:https://dev-api.p-e.kr}
  ai:
    client-mode: ${SAYNOW_AI_CLIENT_MODE:remote}

sentry:
  enabled: ${SENTRY_ENABLED:false}
  environment: ${SENTRY_ENVIRONMENT:dev}
  release: ${SENTRY_RELEASE:saynow-be-dev}
  send-default-pii: false
  max-request-body-size: NONE
  traces-sample-rate: 0.0
  logs:
    enabled: ${SENTRY_LOGS_ENABLED:false}
  logging:
    enabled: false
