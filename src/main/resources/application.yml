spring:
  application:
    name: saynow-be
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

springdoc:
  paths-to-match: /api/v1/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

saynow:
  openapi:
    server-url: ${SAYNOW_OPENAPI_SERVER_URL:https://saynow.p-e.kr}
  web:
    cors:
      allowed-origins: ${SAYNOW_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://10.0.2.2:3000,http://172.16.103.142:3000,http://192.168.219.107:3000,https://saynow-fe-web-git-mvp2-with-ai.vercel.app}
  auth:
    oidc:
      nonce-required: ${SAYNOW_AUTH_OIDC_NONCE_REQUIRED:true}
      google-audiences: ${SAYNOW_AUTH_OIDC_GOOGLE_AUDIENCES:}
      kakao-audiences: ${SAYNOW_AUTH_OIDC_KAKAO_AUDIENCES:}
    token:
      secret: ${SAYNOW_AUTH_TOKEN_SECRET:saynow-development-token-secret-change-before-production}
  ai:
    base-url: ${SAYNOW_AI_BASE_URL:http://15.164.34.102:8080}
    client-mode: ${SAYNOW_AI_CLIENT_MODE:local}
    next-question-path: ${SAYNOW_AI_NEXT_QUESTION_PATH:/api/v1/conversation/next-question}
    closing-message-path: ${SAYNOW_AI_CLOSING_MESSAGE_PATH:/api/v1/conversation/closing-message}
    turn-feedback-path: ${SAYNOW_AI_TURN_FEEDBACK_PATH:/api/v1/conversation/turn-feedback}
    session-feedback-path: ${SAYNOW_AI_SESSION_FEEDBACK_PATH:/api/v1/conversation/session-feedback}
    request-timeout: ${SAYNOW_AI_REQUEST_TIMEOUT:180s}

sentry:
  enabled: ${SENTRY_ENABLED:false}
  send-default-pii: false
  max-request-body-size: NONE
  traces-sample-rate: 0.0
  logs:
    enabled: ${SENTRY_LOGS_ENABLED:false}
  logging:
    enabled: false
