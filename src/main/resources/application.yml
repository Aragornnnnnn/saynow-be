spring:
  application:
    name: saynow-be
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

springdoc:
  paths-to-match: /api/v1/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

saynow:
  web:
    cors:
      allowed-origins: ${SAYNOW_CORS_ALLOWED_ORIGINS:https://saynow-fe-web.vercel.app,http://localhost:3000}
  auth:
    oidc:
      google-audiences: ${SAYNOW_AUTH_OIDC_GOOGLE_AUDIENCES:}
      kakao-audiences: ${SAYNOW_AUTH_OIDC_KAKAO_AUDIENCES:}
    token:
      secret: ${SAYNOW_AUTH_TOKEN_SECRET:saynow-development-token-secret-change-before-production}
  ai:
    base-url: ${SAYNOW_AI_BASE_URL:http://43.202.146.182:8080}
    client-mode: ${SAYNOW_AI_CLIENT_MODE:local}
    turn-evaluation-path: ${SAYNOW_AI_TURN_EVALUATION_PATH:/api/v1/turn-evaluations}
    session-feedback-path: ${SAYNOW_AI_SESSION_FEEDBACK_PATH:/api/v1/session-feedbacks}

sentry:
  enabled: ${SENTRY_ENABLED:false}
  send-default-pii: false
  max-request-body-size: NONE
  traces-sample-rate: 0.0
  logs:
    enabled: ${SENTRY_LOGS_ENABLED:false}
  logging:
    enabled: false
