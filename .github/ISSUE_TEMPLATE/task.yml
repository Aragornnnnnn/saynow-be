name: 작업 이슈
description: 기능, 버그, 문서, 배포/설정 등 백엔드 작업을 등록합니다.
title: "[작업]: "
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: 이슈 유형
      options:
        - 기능 추가
        - 버그 수정
        - 리팩터링
        - 테스트
        - 문서
        - 배포/설정
        - 기타
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 배경 / 문제
      description: 왜 이 작업이 필요한지 적어 주세요.
      placeholder: 현재 어떤 문제가 있나요?
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 작업이 끝났을 때 달성되어야 하는 상태를 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 포함할 작업과 제외할 작업을 구분해 주세요.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 완료 조건
      description: 체크 가능한 완료 조건을 적어 주세요.
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: 검증 방법
      description: 어떤 명령이나 절차로 확인할지 적어 주세요.
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      description: 영향이 없는 항목은 없음으로 적어 주세요.
      value: |
        - API:
        - DB/Migration:
        - 설정/Secret:
        - 배포/운영:
        - 기타:
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 환경
      value: |
        - Profile:
        - Java:
        - Database:
        - 기타:
  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 이슈, PR, 로그, 문서 링크를 적어 주세요.
  - type: markdown
    attributes:
      value: |
        보안 취약점, Secret, 개인정보가 포함된 내용은 공개 이슈에 작성하지 않습니다.
