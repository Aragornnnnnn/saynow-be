name: Deploy Dev EC2

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev-ec2
  cancel-in-progress: false

env:
  APP_DIR: /opt/saynow
  APP_PORT: "8080"
  AWS_REGION: ap-northeast-2
  EC2_PORT: "22"
  JAR_PATH: /opt/saynow/app.jar
  PARAMETER_PATH: /saynow/develop
  SERVICE_NAME: saynow-backend
  UPLOAD_PATH: /tmp/saynow-app.jar

jobs:
  deploy:
    name: Deploy dev to EC2
    runs-on: ubuntu-latest
    environment: develop
    timeout-minutes: 20

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build application
        run: ./gradlew clean build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: saynow-be-dev-${{ github.run_id }}

      - name: Authorize runner SSH ingress
        id: runner-ip
        env:
          EC2_SECURITY_GROUP_ID: ${{ vars.EC2_SECURITY_GROUP_ID }}
        run: |
          set -euo pipefail
          test -n "${EC2_SECURITY_GROUP_ID}"

          RUNNER_IP="$(curl -fsS https://checkip.amazonaws.com | tr -d '\n')"
          test -n "${RUNNER_IP}"
          echo "cidr=${RUNNER_IP}/32" >> "${GITHUB_OUTPUT}"

          error_file="$(mktemp)"
          if ! aws ec2 authorize-security-group-ingress \
            --group-id "${EC2_SECURITY_GROUP_ID}" \
            --ip-permissions "IpProtocol=tcp,FromPort=${EC2_PORT},ToPort=${EC2_PORT},IpRanges=[{CidrIp=${RUNNER_IP}/32,Description=github-actions-${{ github.run_id }}}]" 2>"${error_file}"; then
            if grep -q "InvalidPermission.Duplicate" "${error_file}"; then
              cat "${error_file}"
            else
              cat "${error_file}" >&2
              exit 1
            fi
          fi

      - name: Prepare SSH key
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "${EC2_HOST}"
          test -n "${EC2_SSH_KEY}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "${EC2_SSH_KEY}" | tr -d '\r' > ~/.ssh/saynow_dev
          chmod 600 ~/.ssh/saynow_dev
          ssh-keygen -y -f ~/.ssh/saynow_dev >/dev/null
          ssh-keyscan -H -p "${EC2_PORT}" "${EC2_HOST}" >> ~/.ssh/known_hosts

      - name: Upload jar to EC2
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
        run: |
          set -euo pipefail
          test -n "${EC2_HOST}"
          test -n "${EC2_USER}"

          scp \
            -i ~/.ssh/saynow_dev \
            -P "${EC2_PORT}" \
            build/libs/saynow-be-0.0.1-SNAPSHOT.jar \
            "${EC2_USER}@${EC2_HOST}:${UPLOAD_PATH}"

      - name: Deploy and restart service
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ vars.EC2_USER }}
        run: |
          set -euo pipefail
          test -n "${EC2_HOST}"
          test -n "${EC2_USER}"

          ssh -i ~/.ssh/saynow_dev -p "${EC2_PORT}" "${EC2_USER}@${EC2_HOST}" \
            "APP_DIR='${APP_DIR}' APP_PORT='${APP_PORT}' AWS_REGION='${AWS_REGION}' JAR_PATH='${JAR_PATH}' PARAMETER_PATH='${PARAMETER_PATH}' SERVICE_NAME='${SERVICE_NAME}' UPLOAD_PATH='${UPLOAD_PATH}' bash -s" <<'REMOTE'
          set -euo pipefail

          command -v aws >/dev/null
          command -v curl >/dev/null
          JAVA_BIN="$(command -v java)"
          test -n "${JAVA_BIN}"

          if ! id saynow >/dev/null 2>&1; then
            sudo useradd --system --home-dir "${APP_DIR}" --shell /sbin/nologin saynow
          fi

          params_json="$(mktemp)"
          env_file="$(mktemp)"
          cleanup() {
            rm -f "${params_json}" "${env_file}"
          }
          trap cleanup EXIT

          aws ssm get-parameters-by-path \
            --path "${PARAMETER_PATH}" \
            --with-decryption \
            --recursive \
            --region "${AWS_REGION}" \
            --output json > "${params_json}"

          python3 - "${params_json}" "${PARAMETER_PATH}" > "${env_file}" <<'PY'
          import json
          import sys

          params_file = sys.argv[1]
          base_path = sys.argv[2].rstrip("/")

          with open(params_file) as file:
              payload = json.load(file)

          values = {}
          for parameter in payload.get("Parameters", []):
              name = parameter["Name"]
              if not name.startswith(base_path + "/"):
                  continue
              key = name[len(base_path) + 1:]
              if not key or "/" in key:
                  continue
              values[key] = parameter["Value"]

          required = [
              "DB_URL",
              "DB_USERNAME",
              "DB_PASSWORD",
              "SAYNOW_AUTH_TOKEN_SECRET",
              "SAYNOW_AUTH_OIDC_GOOGLE_AUDIENCES",
              "SAYNOW_AUTH_OIDC_KAKAO_AUDIENCES",
          ]
          optional = [
              "SAYNOW_AI_BASE_URL",
              "SAYNOW_AI_CLIENT_MODE",
              "SAYNOW_CORS_ALLOWED_ORIGINS",
              "SAYNOW_OPENAPI_SERVER_URL",
              "SENTRY_DSN",
              "SENTRY_ENABLED",
              "SENTRY_ENVIRONMENT",
              "SENTRY_LOGS_ENABLED",
              "SENTRY_RELEASE",
          ]
          missing = [key for key in required if not values.get(key)]
          if missing:
              raise SystemExit("Missing required SSM parameters: " + ", ".join(missing))

          values["SPRING_PROFILES_ACTIVE"] = "dev"

          def quote_systemd(value):
              return '"' + value.replace("\\", "\\\\").replace('"', '\\"').replace("\n", "\\n") + '"'

          for key in required + optional + ["SPRING_PROFILES_ACTIVE"]:
              if values.get(key):
                  print(f"{key}={quote_systemd(values[key])}")
          PY

          sudo install -o saynow -g saynow -m 755 -d "${APP_DIR}"
          sudo install -o saynow -g saynow -m 600 "${env_file}" "${APP_DIR}/.env"
          sudo install -o saynow -g saynow -m 644 "${UPLOAD_PATH}" "${JAR_PATH}"

          sudo tee "/etc/systemd/system/${SERVICE_NAME}.service" >/dev/null <<SERVICE
          [Unit]
          Description=SayNow Backend Dev
          After=network-online.target
          Wants=network-online.target

          [Service]
          User=saynow
          Group=saynow
          WorkingDirectory=${APP_DIR}
          EnvironmentFile=${APP_DIR}/.env
          ExecStart=${JAVA_BIN} -jar ${JAR_PATH}
          SuccessExitStatus=143
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo systemctl daemon-reload
          sudo systemctl enable "${SERVICE_NAME}"
          sudo systemctl restart "${SERVICE_NAME}"

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error "http://127.0.0.1:${APP_PORT}/actuator/health"; then
              exit 0
            fi
            sleep 2
          done

          sudo journalctl -u "${SERVICE_NAME}" -n 120 --no-pager
          exit 1
          REMOTE

      - name: Revoke runner SSH ingress
        if: always() && steps.runner-ip.outputs.cidr != ''
        env:
          EC2_SECURITY_GROUP_ID: ${{ vars.EC2_SECURITY_GROUP_ID }}
        run: |
          set -euo pipefail
          test -n "${EC2_SECURITY_GROUP_ID}"

          aws ec2 revoke-security-group-ingress \
            --group-id "${EC2_SECURITY_GROUP_ID}" \
            --ip-permissions "IpProtocol=tcp,FromPort=${EC2_PORT},ToPort=${EC2_PORT},IpRanges=[{CidrIp=${{ steps.runner-ip.outputs.cidr }},Description=github-actions-${{ github.run_id }}}]" || true
